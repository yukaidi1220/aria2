name: build

on: [push, pull_request]

jobs:
  build:
    if: false
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14]
        compiler: [gcc, clang]
        crypto: [openssl, gnutls]
        bittorrent: [with-bt, without-bt]
        exclude:
        - os: macos-14
          crypto: gnutls
        - crypto: openssl
          bittorrent: without-bt

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Linux setup
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install \
          g++-12 \
          clang-15 \
          autoconf \
          automake \
          autotools-dev \
          autopoint \
          libtool \
          pkg-config \
          libssl-dev \
          libgnutls28-dev \
          libc-ares-dev \
          zlib1g-dev \
          libsqlite3-dev \
          libssh2-1-dev \
          libcppunit-dev
    - name: MacOS setup
      if: runner.os == 'macOS'
      run: |
        brew install cppunit gettext openssl libssh2 c-ares sqlite3 \
          autoconf automake pkg-config libtool
    - name: Setup clang (Linux)
      if: runner.os == 'Linux' && matrix.compiler == 'clang'
      run: |
        echo 'CC=clang-15' >> $GITHUB_ENV
        echo 'CXX=clang++-15' >> $GITHUB_ENV
    - name: Setup clang (MacOS)
      if: runner.os == 'macOS' && matrix.compiler == 'clang'
      run: |
        echo 'CC=clang' >> $GITHUB_ENV
        echo 'CXX=clang++' >> $GITHUB_ENV
    - name: Setup gcc (Linux)
      if: runner.os == 'Linux' && matrix.compiler == 'gcc'
      run: |
        echo 'CC=gcc-12' >> $GITHUB_ENV
        echo 'CXX=g++-12' >> $GITHUB_ENV
    - name: Setup gcc (MacOS)
      if: runner.os == 'macOS' && matrix.compiler == 'gcc'
      run: |
        echo 'CC=gcc' >> $GITHUB_ENV
        echo 'CXX=g++' >> $GITHUB_ENV
    - name: Libtool
      run: |
        autoreconf -i
    - name: Setup compiler flags
      run: |
        asanflags="-fsanitize=address,undefined -fno-sanitize-recover=undefined"

        CPPFLAGS="$asanflags -g3"
        LDFLAGS="$asanflags"

        echo 'CPPFLAGS='"$CPPFLAGS" >> $GITHUB_ENV
        echo 'LDFLAGS='"$LDFLAGS" >> $GITHUB_ENV
    - name: Disable BitTorrent
      if: matrix.bittorrent == 'without-bt'
      run: |
        FEATURE_FLAGS="$FEATURE_FLAGS --disable-bittorrent"

        echo 'FEATURE_FLAGS='"$FEATURE_FLAGS" >> $GITHUB_ENV
    - name: Configure autotools (Linux, gnutls)
      if: runner.os == 'Linux' && matrix.crypto == 'gnutls'
      run: |
        ./configure --with-gnutls --without-openssl $FEATURE_FLAGS
    - name: Configure autotools (Linux, openssl)
      if: runner.os == 'Linux' && matrix.crypto == 'openssl'
      run: |
        ./configure --without-gnutls --with-openssl $FEATURE_FLAGS
    - name: Configure autotools (macOS)
      if: runner.os == 'macOS'
      run: |
        ./configure \
          --without-openssl --without-gnutls --with-appletls \
          --disable-nls
    - name: Build aria2
      run: |
        make -j"$(nproc 2> /dev/null || sysctl -n hw.ncpu)" check

  build-windows:
    strategy:
      matrix:
        host: [i686-w64-mingw32, x86_64-w64-mingw32]
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - name: Build dependencies Docker image
      run: |
        docker build \
          --build-arg HOST=${{ matrix.host }} \
          -t aria2-deps-${{ matrix.host }} \
          -f Dockerfile.mingw-ci .
    - name: Build aria2 Windows binary
      run: |
        mkdir -p out
        docker run --rm \
          -e HOST=${{ matrix.host }} \
          -v ${{ github.workspace }}:/src:ro \
          -v ${{ github.workspace }}/out:/out \
          aria2-deps-${{ matrix.host }} bash -c "
            cp -a /src /tmp/aria2-build &&
            cd /tmp/aria2-build &&
            python3 ci/embed-ca-bundle.py /etc/ssl/certs/ca-certificates.crt src/EmbeddedCABundle.h &&
            autoreconf -i &&
            ./mingw-config &&
            grep -q '^#define HAVE_LIBNGHTTP2 1' config.h &&
            make -j\$(nproc) &&
            if ! strings src/aria2c.exe | grep -aq 'nghttp2/'; then
              echo 'aria2c.exe was expected to include nghttp2 HTTP/2 support.'
              exit 1
            fi &&
            if [ '${{ matrix.host }}' = 'i686-w64-mingw32' ]; then
              pe_header=\$(${{ matrix.host }}-objdump -p src/aria2c.exe) &&
              subsystem_major=\$(printf '%s\n' \"\$pe_header\" | awk '/MajorSubsystemVersion/ { print \$2; exit }') &&
              subsystem_minor=\$(printf '%s\n' \"\$pe_header\" | awk '/MinorSubsystemVersion/ { print \$2; exit }') &&
              if [ \"\$subsystem_major:\$subsystem_minor\" != '5:1' ]; then
                echo \"aria2c.exe PE subsystem version is \$subsystem_major.\$subsystem_minor, expected 5.1 for Windows XP.\"
                printf '%s\n' \"\$pe_header\" | grep -Ei 'MajorSubsystemVersion|MinorSubsystemVersion'
                exit 1
              fi &&
              xp_import_denylist='ConvertInterfaceIndexToLuid|ConvertInterfaceLuidToNameA|if_indextoname|if_nametoindex|GetTickCount64|InitializeCriticalSectionEx|InitializeConditionVariable|SleepConditionVariableCS|SleepConditionVariableSRW|AcquireSRWLockExclusive|AcquireSRWLockShared|ReleaseSRWLockExclusive|ReleaseSRWLockShared|CancelIoEx|GetAddrInfoExA|GetAddrInfoExW|FreeAddrInfoEx|GetFileInformationByHandleEx|SetFileInformationByHandle|GetFinalPathNameByHandleA|GetFinalPathNameByHandleW|GetLocaleInfoEx|GetUserDefaultLocaleName|GetSystemTimePreciseAsFileTime|GetQueuedCompletionStatusEx|WSAPoll|InetPtonA|InetPtonW|InetNtopA|InetNtopW' &&
              if printf '%s\n' \"\$pe_header\" | grep -Eiq \"\$xp_import_denylist\"; then
                echo 'aria2c.exe imports a Windows Vista+ symbol unavailable on Windows XP.'
                printf '%s\n' \"\$pe_header\" | grep -Ei \"\$xp_import_denylist\"
                exit 1
              fi
            fi &&
            ${{ matrix.host }}-strip src/aria2c.exe &&
            cp src/aria2c.exe /out/
          "
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: aria2-${{ matrix.host }}
        path: out/aria2c.exe
