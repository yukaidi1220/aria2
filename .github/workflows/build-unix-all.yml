name: build-unix-all

on:
  workflow_dispatch:
  push:
    branches:
    - ci/unix-all
    - ci/unix-all/**

jobs:
  linux:
    name: linux ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-22.04
          arch: x86_64
        - os: ubuntu-22.04-arm
          arch: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          autopoint \
          autotools-dev \
          g++ \
          gcc \
          libcppunit-dev \
          libc-ares-dev \
          libexpat1-dev \
          libgmp-dev \
          libnghttp2-dev \
          libsqlite3-dev \
          libssh2-1-dev \
          libssl-dev \
          libtool \
          libxml2-dev \
          nettle-dev \
          pkg-config \
          zlib1g-dev

    - name: Generate configure script
      run: autoreconf -i

    - name: Configure
      run: ./configure --without-gnutls --with-openssl

    - name: Build
      run: make -j"$(nproc)"

    - name: Collect artifact
      run: |
        mkdir -p out
        cp src/aria2c out/aria2c

    - name: Smoke test
      run: out/aria2c -v

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-linux-${{ matrix.arch }}
        path: out/aria2c

  macos:
    name: macos ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-15-intel
          arch: x86_64
        - os: macos-15
          arch: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install \
          autoconf \
          automake \
          c-ares \
          gettext \
          libtool \
          nghttp2 \
          pkg-config

    - name: Generate configure script
      run: autoreconf -i

    - name: Configure
      run: |
        cares_prefix="$(brew --prefix c-ares)"
        nghttp2_prefix="$(brew --prefix nghttp2)"
        test -f "$cares_prefix/lib/libcares.a"
        test -f "$nghttp2_prefix/lib/libnghttp2.a"
        export LIBCARES_CFLAGS="-I$cares_prefix/include"
        export LIBCARES_LIBS="$cares_prefix/lib/libcares.a -lresolv"
        export LIBNGHTTP2_CFLAGS="-I$nghttp2_prefix/include"
        export LIBNGHTTP2_LIBS="$nghttp2_prefix/lib/libnghttp2.a"
        ./configure \
          --without-openssl \
          --without-gnutls \
          --with-appletls \
          --with-libcares \
          --without-libssh2 \
          --with-libnghttp2 \
          --without-sqlite3 \
          --without-libxml2 \
          --without-libexpat \
          --without-libnettle \
          --without-libgmp \
          --without-libgcrypt \
          --disable-nls

    - name: Build
      run: make -j"$(sysctl -n hw.ncpu)"

    - name: Collect artifact
      run: |
        mkdir -p out
        cp src/aria2c out/aria2c
        codesign --force --sign - out/aria2c

    - name: Smoke test
      run: |
        out/aria2c --version | tee aria2c-version.txt
        grep -q 'AppleTLS' aria2c-version.txt
        grep -q 'c-ares/' aria2c-version.txt
        grep -q 'nghttp2/' aria2c-version.txt
        out/aria2c --help=async-dns-mode | tee async-dns-mode-help.txt
        grep -Eq 'dot|doh' async-dns-mode-help.txt

    - name: Check macOS artifact portability
      run: |
        otool -L out/aria2c
        if otool -L out/aria2c | grep -E '/opt/homebrew|/usr/local/(opt|Cellar)'; then
          echo "macOS artifact still depends on Homebrew absolute library paths."
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-macos-${{ matrix.arch }}
        path: out/aria2c
