name: build-unix-all

on:
  workflow_dispatch:
  push:
    branches:
    - ci/unix-all
    - ci/unix-all/**

jobs:
  linux:
    name: linux x86_64
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          autopoint \
          autotools-dev \
          g++ \
          gcc \
          libcppunit-dev \
          libc-ares-dev \
          libexpat1-dev \
          libgmp-dev \
          libnghttp2-dev \
          libsqlite3-dev \
          libssh2-1-dev \
          libssl-dev \
          libtool \
          libxml2-dev \
          nettle-dev \
          pkg-config \
          zlib1g-dev

    - name: Generate configure script
      run: autoreconf -i

    - name: Configure
      run: ./configure --without-gnutls --with-openssl

    - name: Build
      run: make -j"$(nproc)"

    - name: Smoke test
      run: src/aria2c -v

    - name: Collect artifact
      run: |
        mkdir -p out
        cp src/aria2c out/aria2c

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-linux-x86_64
        path: out/aria2c

  macos:
    name: macos x86_64
    runs-on: macos-15-intel

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install \
          autoconf \
          automake \
          c-ares \
          cppunit \
          expat \
          gettext \
          gmp \
          libssh2 \
          libtool \
          libxml2 \
          nettle \
          nghttp2 \
          openssl \
          pkg-config \
          sqlite3

    - name: Configure Homebrew pkg-config paths
      run: |
        pkg_config_path=
        for formula in c-ares cppunit expat libssh2 libxml2 nghttp2 openssl sqlite3; do
          prefix="$(brew --prefix "$formula")"
          if [ -d "$prefix/lib/pkgconfig" ]; then
            pkg_config_path="$prefix/lib/pkgconfig:$pkg_config_path"
          fi
        done
        echo "PKG_CONFIG_PATH=$pkg_config_path$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

    - name: Generate configure script
      run: autoreconf -i

    - name: Configure
      run: |
        ./configure \
          --without-openssl \
          --without-gnutls \
          --with-appletls \
          --disable-nls

    - name: Build
      run: make -j"$(sysctl -n hw.ncpu)"

    - name: Smoke test
      run: src/aria2c -v

    - name: Collect artifact
      run: |
        mkdir -p out
        cp src/aria2c out/aria2c

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-macos-x86_64
        path: out/aria2c
