name: build-unix-all

on:
  workflow_dispatch:
  push:
    branches:
    - ci/unix-all
    - ci/unix-all/**

jobs:
  linux:
    name: linux ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-22.04
          arch: x86_64
        - os: ubuntu-22.04-arm
          arch: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          autopoint \
          autotools-dev \
          g++ \
          gcc \
          libcppunit-dev \
          libc-ares-dev \
          libexpat1-dev \
          libgmp-dev \
          libnghttp2-dev \
          libsqlite3-dev \
          libssh2-1-dev \
          libssl-dev \
          libtool \
          libxml2-dev \
          nettle-dev \
          pkg-config \
          zlib1g-dev

    - name: Generate configure script
      run: autoreconf -i

    - name: Configure
      run: ./configure --without-gnutls --with-openssl

    - name: Build
      run: make -j"$(nproc)"

    - name: Collect artifact
      run: |
        mkdir -p out
        cp src/aria2c out/aria2c

    - name: Smoke test
      run: out/aria2c -v

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-linux-${{ matrix.arch }}
        path: out/aria2c

  macos:
    name: macos ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-15-intel
          arch: x86_64
        - os: macos-15
          arch: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install \
          autoconf \
          automake \
          c-ares \
          cppunit \
          expat \
          gettext \
          gmp \
          libssh2 \
          libtool \
          libxml2 \
          nettle \
          nghttp2 \
          openssl \
          pkg-config \
          sqlite3

    - name: Configure Homebrew pkg-config paths
      run: |
        pkg_config_path=
        for formula in c-ares cppunit expat libssh2 libxml2 nghttp2 openssl sqlite3; do
          prefix="$(brew --prefix "$formula")"
          if [ -d "$prefix/lib/pkgconfig" ]; then
            pkg_config_path="$prefix/lib/pkgconfig:$pkg_config_path"
          fi
        done
        echo "PKG_CONFIG_PATH=$pkg_config_path$PKG_CONFIG_PATH" >> "$GITHUB_ENV"

    - name: Generate configure script
      run: autoreconf -i

    - name: Configure
      run: |
        ./configure \
          --without-openssl \
          --without-gnutls \
          --with-appletls \
          --disable-nls

    - name: Build
      run: make -j"$(sysctl -n hw.ncpu)"

    - name: Bundle Homebrew dylibs
      run: |
        set -euo pipefail
        mkdir -p out/lib
        cp src/aria2c out/aria2c
        targets="out/aria2c"

        while [ -n "$targets" ]; do
          target="${targets%%$'\n'*}"
          if [ "$targets" = "$target" ]; then
            targets=
          else
            targets="${targets#*$'\n'}"
          fi

          deps="$(otool -L "$target" | awk 'NR > 1 { print $1 }' | grep -E '^(/opt/homebrew|/usr/local)/(opt|Cellar)/' || true)"
          while IFS= read -r dep; do
            [ -n "$dep" ] || continue
            base="$(basename "$dep")"
            bundled="out/lib/$base"

            if [ ! -e "$bundled" ]; then
              cp "$dep" "$bundled"
              chmod u+w "$bundled"
              install_name_tool -id "@rpath/$base" "$bundled"
              targets="${targets}${targets:+$'\n'}$bundled"
            fi

            if [ "$target" = "out/aria2c" ]; then
              install_name_tool -change "$dep" "@executable_path/lib/$base" "$target"
            else
              install_name_tool -change "$dep" "@loader_path/$base" "$target"
            fi
          done <<< "$deps"
        done

        if ls out/lib/*.dylib >/dev/null 2>&1; then
          codesign --force --sign - out/aria2c out/lib/*.dylib
        else
          codesign --force --sign - out/aria2c
        fi

    - name: Smoke test packaged binary
      run: out/aria2c -v

    - name: Check macOS artifact portability
      run: |
        if otool -L out/aria2c out/lib/*.dylib 2>/dev/null | grep -E '/opt/homebrew|/usr/local/(opt|Cellar)'; then
          echo "macOS artifact still depends on Homebrew absolute library paths."
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-macos-${{ matrix.arch }}
        path: out
