name: build-unix-all

on:
  workflow_dispatch:
  push:
    branches:
    - ci/unix-all
    - ci/unix-all/**

jobs:
  linux:
    name: linux ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-24.04
          arch: x86_64
        - os: ubuntu-22.04-arm
          arch: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          autopoint \
          autotools-dev \
          g++ \
          gcc \
          gdb \
          libcppunit-dev \
          libc-ares-dev \
          libexpat1-dev \
          libgmp-dev \
          libsqlite3-dev \
          libssh2-1-dev \
          libssl-dev \
          libtool \
          libxml2-dev \
          nettle-dev \
          pkg-config \
          zlib1g-dev

    - name: Build nghttp2 from source
      run: |
        set -euo pipefail
        prefix="$RUNNER_TEMP/static-deps"
        mkdir -p "$prefix"
        curl -L -o nghttp2.tar.gz https://github.com/nghttp2/nghttp2/releases/download/v1.64.0/nghttp2-1.64.0.tar.gz
        tar xf nghttp2.tar.gz
        cd nghttp2-1.64.0
        autoreconf -i
        ./configure \
          --prefix="$prefix" \
          --enable-lib-only \
          --enable-static \
          --disable-shared \
          --disable-threads \
          --disable-examples \
          --disable-python-bindings \
          --without-libxml2 \
          --without-openssl \
          --without-jemalloc \
          --without-zlib \
          --without-cunit
        make -j"$(nproc)"
        make install
        cd ..
        echo "PKG_CONFIG_PATH=$prefix/lib/pkgconfig" >> "$GITHUB_ENV"

    - name: Generate configure script
      run: autoreconf -i

    - name: Configure
      run: |
        prefix="$RUNNER_TEMP/static-deps"
        test -f "$prefix/lib/libnghttp2.a"
        PKG_CONFIG_PATH="$prefix/lib/pkgconfig:$PKG_CONFIG_PATH" \
          ./configure --without-gnutls --with-openssl --with-libnghttp2

    - name: Build and test
      run: |
        make -j"$(nproc)" check || {
          status=$?
          echo "make check failed with exit code $status"
          echo '=== test-suite.log ==='
          find . -name test-suite.log -print -exec sed -n '1,500p' {} \;
          echo '=== aria2c.log TAIL (last 200 lines) ==='
          if [ -f test/aria2c.log ]; then tail -n 200 test/aria2c.log; fi
          echo '=== aria2c.log HEAD (first 100 lines) ==='
          if [ -f test/aria2c.log ]; then head -n 100 test/aria2c.log; fi
          if [ "$status" -eq 139 ] || [ "$status" -eq 134 ] || [ "$status" -eq 2 ]; then
            echo '=== Re-running test binary under GDB ==='
            cd test && gdb -batch \
              -ex 'set confirm off' \
              -ex run \
              -ex 'thread apply all bt full' \
              -ex quit \
              ./aria2c 2>&1 | tail -200
          fi
          exit "$status"
        }

    - name: Collect artifact
      run: |
        mkdir -p out
        cp src/aria2c out/aria2c

    - name: Smoke test
      run: out/aria2c -v

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: aria2-linux-${{ matrix.arch }}
        path: out/aria2c

  macos:
    name: macos ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-15-intel
          arch: x86_64
        - os: macos-15
          arch: arm64

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        brew install \
          autoconf \
          automake \
          cmake \
          gettext \
          libtool \
          pkg-config

    - name: Build static macOS dependencies
      run: |
        set -euo pipefail
        prefix="$RUNNER_TEMP/static-deps"
        mkdir -p "$prefix"

        curl -L -o c-ares.tar.gz https://github.com/c-ares/c-ares/releases/download/v1.34.5/c-ares-1.34.5.tar.gz
        tar xf c-ares.tar.gz
        cmake -S c-ares-1.34.5 -B c-ares-build \
          -DCMAKE_INSTALL_PREFIX="$prefix" \
          -DCARES_STATIC=ON \
          -DCARES_SHARED=OFF \
          -DCARES_BUILD_TOOLS=OFF \
          -DCARES_BUILD_TESTS=OFF
        cmake --build c-ares-build --parallel "$(sysctl -n hw.ncpu)"
        cmake --install c-ares-build

        curl -L -o nghttp2.tar.gz https://github.com/nghttp2/nghttp2/releases/download/v1.64.0/nghttp2-1.64.0.tar.gz
        tar xf nghttp2.tar.gz
        cd nghttp2-1.64.0
        autoreconf -i
        ./configure \
          --prefix="$prefix" \
          --enable-lib-only \
          --enable-static \
          --disable-shared \
          --disable-threads \
          --disable-examples \
          --disable-python-bindings \
          --without-libxml2 \
          --without-openssl \
          --without-jemalloc \
          --without-zlib \
          --without-cunit
        make -j"$(sysctl -n hw.ncpu)"
        make install
        cd ..

        echo "PKG_CONFIG_PATH=$prefix/lib/pkgconfig" >> "$GITHUB_ENV"

    - name: Generate configure script
      run: autoreconf -i

    - name: Configure
      run: |
        prefix="$RUNNER_TEMP/static-deps"
        test -f "$prefix/lib/libcares.a"
        test -f "$prefix/lib/libnghttp2.a"
        ./configure \
          --without-openssl \
          --without-gnutls \
          --with-appletls \
          --with-libcares \
          --without-libssh2 \
          --with-libnghttp2 \
          --without-sqlite3 \
          --without-libxml2 \
          --without-libexpat \
          --without-libnettle \
          --without-libgmp \
          --without-libgcrypt \
          --disable-nls

    - name: Build
      run: make -j"$(sysctl -n hw.ncpu)"

    - name: Collect artifact
      run: |
        mkdir -p out
        cp src/aria2c out/aria2c
        codesign --force --sign - out/aria2c

    - name: Smoke test
      run: |
        out/aria2c --version | tee aria2c-version.txt
        grep -q 'AppleTLS' aria2c-version.txt
        grep -q 'c-ares/' aria2c-version.txt
        grep -q 'nghttp2/' aria2c-version.txt
        out/aria2c --help=async-dns-mode | tee async-dns-mode-help.txt
        grep -Eq 'dot|doh' async-dns-mode-help.txt

    - name: Check macOS artifact portability
      run: |
        otool -L out/aria2c
        if otool -L out/aria2c | grep -E '/opt/homebrew|/usr/local/(opt|Cellar)'; then
          echo "macOS artifact still depends on Homebrew absolute library paths."
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: aria2-macos-${{ matrix.arch }}
        path: out/aria2c
